<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>asand.ro — coming soon</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,700;1,400;1,700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --red:   #cc1100;
    --dark:  #151515;
    --mid:   #3a3a3a;
    --light: #e0e0e0;
    --dim:   #777;
  }

  html {
    height: auto;
    background: var(--black);
  }

  body {
    min-height: 100vh;
    background: var(--black);
    color: var(--light);
    overflow-y: auto;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 10;
    opacity: 0.3;
  }

  .hot-line {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    animation: scan 4s ease-in-out infinite;
    z-index: 20;
  }
  @keyframes scan {
    0%   { transform: scaleX(0); transform-origin: left; opacity: 0; }
    30%  { transform: scaleX(1); transform-origin: left; opacity: 1; }
    70%  { transform: scaleX(1); transform-origin: right; opacity: 1; }
    100% { transform: scaleX(0); transform-origin: right; opacity: 0; }
  }

  .stage {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 100px 10vw 80px;
    position: relative;
  }

  .bg-number {
    position: absolute;
    right: 6vw;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(100px, 18vw, 220px);
    color: var(--dark);
    line-height: 1;
    user-select: none;
    pointer-events: none;
    letter-spacing: -2px;
    opacity: 0;
    animation: fadeUp 1s 0.2s forwards;
  }

  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(11px, 1.1vw, 14px);
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.7s 0.5s forwards;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 100px);
    line-height: 0.92;
    letter-spacing: 0.01em;
    color: var(--light);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s 0.75s forwards;
  }

  h1 em {
    font-style: italic;
    color: var(--red);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(38px, 6vw, 82px);
  }

  .rule {
    width: 50px;
    height: 2px;
    background: var(--red);
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.6s 1.05s forwards;
  }

  .subtext {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(15px, 1.6vw, 19px);
    font-weight: 400;
    font-style: italic;
    color: var(--dim);
    line-height: 1.55;
    max-width: 520px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.7s 1.2s forwards;
  }

  .subtext strong {
    color: var(--light);
    font-style: normal;
    font-weight: 700;
  }

  .email-line {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    animation: fadeUp 0.7s 1.5s forwards;
  }

  .email-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--red);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(204,17,0,0.6); }
    50%       { box-shadow: 0 0 0 8px rgba(204,17,0,0); }
  }

  .email-addr {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(15px, 1.6vw, 19px);
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--light);
    text-decoration: none;
    border-bottom: 1px solid var(--mid);
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }

  .email-addr:hover {
    color: var(--red);
    border-color: var(--red);
  }

  .brand {
    position: relative;
    bottom: auto;
    left: auto;
    margin-top: 120px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    opacity: 0;
    animation: fadeUp 0.6s 1.8s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .stage { padding: 60px 7vw 60px; }
    .bg-number { display: none; }
    h1 { font-size: clamp(48px, 14vw, 72px); }
  }
</style>
</head>
<body>

<div class="hot-line"></div>

<div class="stage">

  <div class="bg-number" aria-hidden="true">2026</div>

  <p class="eyebrow">asand.ro &nbsp;/&nbsp; status: în pregătire</p>

  <h1>
    Nimic<br>
    de văzut<br>
    <em>aici.</em><br>
    Deocamdată.
  </h1>

  <div class="rule"></div>

  <p class="subtext">
    Nu e gata. Nu e pentru toată lumea.<br>
    Când va fi, va fi <strong>corect făcut</strong> — nu rapid, nu de dragul artei.<br>
    Până atunci, dacă știi ce vrei și ești serios —
    <strong>scrie-mi.</strong>
  </p>

  <div class="email-line">
    <span class="email-dot" aria-hidden="true"></span>
    <a class="email-addr" href="mailto:salut.andreead@gmail.com">salut.andreead@gmail.com</a>
  </div>

  <p class="brand">&#169; 2026 a[sand].ro &nbsp;&#8212;&nbsp; București</p>

</div>

</body>
</html>
